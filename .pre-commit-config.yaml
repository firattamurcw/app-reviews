repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: typecheck
        name: typecheck (mypy)
        entry: make typecheck
        language: system
        pass_filenames: false
        types: [python]
      - id: test
        name: tests (pytest)
        entry: make test
        language: system
        pass_filenames: false
        types: [python]
